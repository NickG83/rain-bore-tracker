<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rain & Bore Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/brand/xanzaree/styles/xanzaree-theme.css" />
  <style>
    body { margin: 0; }
    .page { margin: 10px auto 20px; max-width: 980px; padding: 0 12px 20px; }
    .card { padding: 18px; margin-bottom: 14px; }
    h2 { font-size: clamp(1.15rem, 2.2vw, 1.4rem); }
    label {
      display: block;
      margin-bottom: 10px;
      color: var(--xanz-ocean-mid);
      font-size: 0.92rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      box-sizing: border-box;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
    }
    input:focus {
      outline: 2px solid color-mix(in srgb, var(--primary) 20%, transparent);
      outline-offset: 1px;
      border-color: var(--primary);
    }
    button {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: var(--surface-2); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .stepper { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 0; border-bottom: 1px solid var(--border); }
    th {
      text-align: left;
      color: var(--xanz-ocean-mid);
      font-weight: 700;
      font-size: 0.9rem;
    }
    td.num, th.num { text-align: right; }
    .brand-header {
      background: linear-gradient(130deg, rgba(1,55,111,0.97) 0%, rgba(4,22,66,0.97) 100%);
      border-radius: var(--radius);
      color: var(--xanz-surf-mist);
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .brand-hero {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      min-height: clamp(130px, 18vw, 165px);
      padding: 12px 18px 14px;
    }
    .brand-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      gap: 4px;
      max-width: min(420px, 100%);
    }
    .brand-copy h1 {
      margin: 0;
      font-family: var(--font-heading);
      font-size: clamp(1.45rem, 3vw, 2.05rem);
      line-height: 1.15;
      color: var(--xanz-surf-mist);
    }
    .brand-copy p {
      margin: 0;
      opacity: 0.92;
      font-size: 0.95rem;
      max-width: 44ch;
    }
    .brand-logo {
      width: min(170px, 100%);
      display: block;
      margin-bottom: 2px;
      height: auto;
    }
    @media (max-width: 640px) {
      .page { margin-top: 8px; padding: 0 10px 16px; }
      .brand-hero {
        min-height: 0;
        padding: 12px 14px;
      }
      .brand-copy {
        max-width: 100%;
        gap: 3px;
      }
      .row { grid-template-columns: 1fr; }
    }
    .tiles {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 10px 0 14px;
    }
    .tile {
      border: 1px solid color-mix(in srgb, var(--primary) 20%, var(--border));
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      box-shadow: 0 3px 10px rgba(4, 22, 66, 0.07);
    }
    .tile-label {
      font-size: 0.78rem;
      color: var(--xanz-ocean-mid);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .tile-value {
      font-size: clamp(1.45rem, 3.4vw, 1.85rem);
      font-weight: 700;
      color: var(--xanz-navy);
      line-height: 1.15;
      font-family: var(--font-heading);
    }
    .tile-sub {
      margin-top: 4px;
      font-size: 0.79rem;
      color: var(--text-muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }
    #status {
      margin-left: 2px;
      color: var(--text-muted);
      font-size: 0.88rem;
    }
    @media (max-width: 860px) {
      .tiles { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .tiles { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
  <header class="brand-header">
    <div class="brand-hero">
      <div class="brand-copy">
        <img class="brand-logo" src="/brand/xanzaree/assets/xanzaree_logo_transparent_1024h.png" alt="Xanzaree logo" />
        <h1>Rain &amp; Bore Tracker</h1>
        <p>Track rainfall and bore use with Xanzaree reporting visuals.</p>
      </div>
    </div>
  </header>

<section class="tiles">
  <div class="tile">
    <div class="tile-label">Rain — Year to Date</div>
    <div class="tile-value" id="tile_rain_ytd">—</div>
    <div class="tile-sub" id="tile_range">—</div>
  </div>

  <div class="tile">
    <div class="tile-label">Bore — Year to Date</div>
    <div class="tile-value" id="tile_bore_ytd">—</div>
    <div class="tile-sub">Total usage</div>
  </div>
  
<div class="tile">
  <div class="tile-label">Days since last rain</div>
  <div class="tile-value" id="tile_days_since_rain">—</div>
  <div class="tile-sub" id="tile_last_rain_info">—</div>
</div>
  
</section>
  <div class="card">
    <h2>Quick Add</h2>
    <div class="row">
      <label>
        Date
        <input id="entry_date" type="date" />
      </label>
      <label>
        Rain (mm)
        <input id="rain_mm" inputmode="decimal" placeholder="e.g. 12.5" />
      </label>
    </div>

<label style="margin-top:6px;">
  Bore usage (litres)
  <input id="bore_litres" inputmode="numeric" placeholder="e.g. 1000" />
</label>

    <div class="row" style="margin-top:6px;">
     <label>
        Notes (optional)
        <input id="notes" placeholder="e.g. topped up header tank twice" />
      </label>
    </div>

    <div class="actions">
      <button id="save_btn" class="btn-primary" type="button">Save entry</button>
      <button id="cancel_btn" class="btn-secondary" type="button" style="display:none;">Cancel edit</button>
      <button id="download_btn" class="btn-secondary" type="button">Download CSV</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="card">
    <h2>Monthly totals</h2>
    <canvas id="monthly_chart" height="120"></canvas>
  </div>
  
<div class="card">
  <h2>Rainfall by month (annual comparison)</h2>
  <canvas id="rain_year_month_chart" height="120"></canvas>
</div>
  
  <div class="card">
    <h2>Recent entries</h2>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th class="num">Rain (mm)</th>
            <th class="num">Bore (L)</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entries_body"></tbody>
      </table>
    </div>
  </div>

  <script src="/app.js"></script>
  </main>
</body>
</html>
