<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rain & Bore Tracker</title>
  <link rel="stylesheet" href="/brand/xanzaree/styles/xanzaree-theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px auto; max-width: 900px; padding: 0 8px; line-height: 1.45; }
    .card { padding: 16px; margin-bottom: 16px; }
    h1, h2 { margin-top: 0; }
    .brand-header { display: grid; grid-template-columns: minmax(130px, 190px) 1fr; gap: 16px; align-items: center; margin-bottom: 16px; }
    .brand-logo { max-width: 190px; width: 100%; height: auto; display: block; }
    .brand-hero { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); display: block; }
    label { display: block; margin-bottom: 10px; color: var(--text-muted); }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .stepper { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; color: var(--text); }
    th, td { padding: 8px 0; border-bottom: 1px solid var(--border); }
    th { text-align: left; }
    td.num, th.num { text-align: right; }
     @media (max-width: 640px) {
    .row, .brand-header { grid-template-columns: 1fr; }
    .brand-logo { max-width: 160px; }
  }
     .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0 16px;
  }
  .tile {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    padding: 14px 16px;
  }
  .tile-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .tile-value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--primary);
  }
  .tile-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .actions { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  #status { margin-left:2px; color: var(--text-muted); }

  @media (max-width: 640px) {
    .tiles { grid-template-columns: 1fr; }
  }
  </style>
</head>
<body>
  <header class="brand-header" aria-label="Xanzaree banner">
    <img class="brand-logo" src="/brand/xanzaree/assets/xanzaree_logo_transparent_1024h.png" alt="Xanzaree logo" />
    <img class="brand-hero" src="/brand/xanzaree/assets/xanzaree_hero_2400w.webp" alt="Xanzaree coastal landscape artwork" />
  </header>
  <h1>Rain & Bore Tracker</h1>
  
<div class="tiles">
  <div class="tile">
    <div class="tile-label">Rain — Year to Date</div>
    <div class="tile-value" id="tile_rain_ytd">—</div>
    <div class="tile-sub" id="tile_range">—</div>
  </div>

  <div class="tile">
    <div class="tile-label">Bore — Year to Date</div>
    <div class="tile-value" id="tile_bore_ytd">—</div>
    <div class="tile-sub">Total usage</div>
  </div>
  
<div class="tile">
  <div class="tile-label">Days since last rain</div>
  <div class="tile-value" id="tile_days_since_rain">—</div>
  <div class="tile-sub" id="tile_last_rain_info">—</div>
</div>
  
</div>
  <div class="card">
    <h2>Quick Add</h2>
    <div class="row">
      <label>
        Date
        <input id="entry_date" type="date" />
      </label>
      <label>
        Rain (mm)
        <input id="rain_mm" inputmode="decimal" placeholder="e.g. 12.5" />
      </label>
    </div>

<label style="margin-top:10px;">
  Bore usage (litres)
  <input id="bore_litres" inputmode="numeric" placeholder="e.g. 1000" />
</label>

    <div class="row" style="margin-top:10px;">
     <label>
        Notes (optional)
        <input id="notes" placeholder="e.g. topped up header tank twice" />
      </label>
    </div>

    <div class="actions">
      <button id="save_btn" class="btn-primary" type="button">Save entry</button>
      <button id="cancel_btn" class="btn-secondary" type="button" style="display:none;">Cancel edit</button>
      <button id="download_btn" class="btn-secondary" type="button">Download CSV</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="card">
    <h2>Monthly totals</h2>
    <canvas id="monthly_chart" height="120"></canvas>
  </div>
  
<div class="card">
  <h2>Rainfall by month (annual comparison)</h2>
  <canvas id="rain_year_month_chart" height="120"></canvas>
</div>
  
  <div class="card">
    <h2>Recent entries</h2>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th class="num">Rain (mm)</th>
            <th class="num">Bore (L)</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entries_body"></tbody>
      </table>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
