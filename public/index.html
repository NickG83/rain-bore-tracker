<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rain & Bore Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; max-width: 900px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    label { display: block; margin-bottom: 10px; }
    input { width: 100%; padding: 10px; box-sizing: border-box; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .stepper { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 0; border-bottom: 1px solid #eee; }
    th { text-align: left; }
    td.num, th.num { text-align: right; }
     @media (max-width: 640px) {
    .row { grid-template-columns: 1fr; }
  }
     .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0 16px;
  }
  .tile {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .tile-label {
    font-size: 13px;
    opacity: 0.75;
    margin-bottom: 6px;
  }
  .tile-value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
  }
  .tile-sub {
    margin-top: 6px;
    font-size: 12px;
    opacity: 0.7;
  }

  @media (max-width: 640px) {
    .tiles { grid-template-columns: 1fr; }
  }
  </style>
</head>
<body>
  <h1>Rain & Bore Tracker</h1>
  
<div class="tiles">
  <div class="tile">
    <div class="tile-label">Rain — Year to Date</div>
    <div class="tile-value" id="tile_rain_ytd">—</div>
    <div class="tile-sub" id="tile_range">—</div>
  </div>

  <div class="tile">
    <div class="tile-label">Bore — Year to Date</div>
    <div class="tile-value" id="tile_bore_ytd">—</div>
    <div class="tile-sub">Total usage</div>
  </div>
  
<div class="tile">
  <div class="tile-label">Days since last rain</div>
  <div class="tile-value" id="tile_days_since_rain">—</div>
  <div class="tile-sub" id="tile_last_rain_info">—</div>
</div>
  
</div>
  <div class="card">
    <h2>Quick Add</h2>
    <div class="row">
      <label>
        Date
        <input id="entry_date" type="date" />
      </label>
      <label>
        Rain (mm)
        <input id="rain_mm" inputmode="decimal" placeholder="e.g. 12.5" />
      </label>
    </div>

<label style="margin-top:10px;">
  Bore usage (litres)
  <input id="bore_litres" inputmode="numeric" placeholder="e.g. 1000" />
</label>

    <div class="row" style="margin-top:10px;">
     <label>
        Notes (optional)
        <input id="notes" placeholder="e.g. topped up header tank twice" />
      </label>
    </div>

    <div style="margin-top:12px;">
      <button id="save_btn" type="button">Save entry</button>
      <button id="cancel_btn" type="button" style="display:none;">Cancel edit</button>
      <button id="download_btn" type="button">Download CSV</button>
      <span id="status" style="margin-left:10px; opacity:.7;"></span>
    </div>
  </div>

  <div class="card">
    <h2>Monthly totals</h2>
    <canvas id="monthly_chart" height="120"></canvas>
  </div>
  
<div class="card">
  <h2>Rainfall by month (annual comparison)</h2>
  <canvas id="rain_year_month_chart" height="120"></canvas>
</div>
  
  <div class="card">
    <h2>Recent entries</h2>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th class="num">Rain (mm)</th>
            <th class="num">Bore (L)</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entries_body"></tbody>
      </table>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
